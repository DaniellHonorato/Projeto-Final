<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CaminhoNinja | Recomendações</title>

  <script src="../js/sessao.js"></script>

  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="icon" href="../assets/icon/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body onload="validarSessao(); renderizarAnimes()">

  <div class="dashboard-container">
    
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-logo" style="text-align: center; margin-bottom: 20px;">
        <a href="../index.html"><img src="../assets/icon/logo.png" alt="Caminho Ninja" style="max-width: 100%; height: auto; max-height: 80px; cursor: pointer; transition: opacity 0.3s;" /></a>
      </div>
      <div class="sidebar-user">
        Olá, <span id="b_usuario">Ninja</span>!
      </div>
      <hr class="sidebar-divider">
      <ul class="sidebar-menu">
        <li>
          <a href="dashboard.html">
            <img src="../assets/icon/bandana.png" width="20" height="20" alt="Ícone Dashboard">
            Dashboard
          </a>
        </li>
        <li>
          <a href="recomendacoes.html" class="active">
            <img src="../assets/icon/grimorio.png" width="20" height="20" alt="Ícone Recomendações">
            Recomendações
          </a>
        </li>
        <li>
          <a href="linha-vida.html">
            <img src="../assets/icon/haikyuu.png" width="20" height="20" alt="Ícone Linha da Vida">
            Linha da Vida
          </a>
        </li>
      </ul>
      <div class="sidebar-bottom">
        <button class="botao-sair" onclick="limparSessao()">Sair da vila</button>
      </div>
    </nav>

    <!-- Conteúdo Principal -->
    <div class="conteudo-painel">

      <div class="secao-boas-vindas">
        <h2>Recomendações da Vila</h2>
        <p>Explore nossa seleção de 10 grandes animes que todo ninja deve assistir!</p>
      </div>

      <!-- Grid de Animes -->
      <div class="grid-animes" id="container_animes">
        <!-- Os animes serão injetados aqui via JavaScript -->
      </div> <!-- Fim grid-animes -->

    </div> <!-- Fim conteudo-painel -->
  </div> <!-- Fim dashboard-container -->



  <!-- Modal de Detalhes -->
  <div id="modal_anime" class="modal-overlay">
    <div class="modal-content">
      <span class="close-btn" onclick="fecharModal()">&times;</span>
      <div class="modal-body">
        <img id="modal_img" src="" alt="Capa do Anime">
        <div class="modal-info">
          <div class="modal-titulo-linha">
            <h2 id="modal_titulo">Título</h2>
            <button id="btn_favorito" class="btn-favoritar" onclick="toggleFavorito()">
              <span id="icone_favorito">♥</span>
              <span id="texto_favorito">Favoritar</span>
            </button>
          </div>
          <p class="modal-genero"><strong>Gênero:</strong> <span id="modal_generos"></span></p>
          <p class="modal-recomendacao" id="modal_recomendacao"></p>
          <div class="modal-sinopse">
            <strong>Sinopse:</strong>
            <p id="modal_texto_sinopse"></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Dados dos Animes
    let listaAnimes = [];
    let idAnimeAtual = null;

    function renderizarAnimes() {
      var container = document.getElementById("container_animes");
      container.innerHTML = "Carregando recomendações da vila...";

      fetch("/animes/listar")
        .then(function (resposta) {
          if (resposta.ok) {
            resposta.json().then(function (animesBanco) {
              listaAnimes = animesBanco;
              container.innerHTML = "";
              listaAnimes.forEach(function (anime, index) {
                container.insertAdjacentHTML('beforeend', `
                  <div class="card-anime" onclick="abrirModal(${index})">
                    <div class="capa-wrapper">
                      <img src="${anime.imagem}" alt="${anime.titulo}">
                    </div>
                    <h3>${anime.titulo}</h3>
                  </div>
                `);
              });
            });
          } else {
            console.error("Nenhum dado encontrado ou erro na API");
            container.innerHTML = "Falha ao carregar as recomendações.";
          }
        })
        .catch(function (error) {
          console.error("Erro na obtenção dos animes: " + error.message);
          container.innerHTML = "Erro ao conectar com o servidor.";
        });
    }

    function abrirModal(index) {
      var anime = listaAnimes[index];
      idAnimeAtual = parseInt(anime.id);

      // Referencia todos os elementos do modal de uma vez
      var imgModal       = document.getElementById("modal_img");
      var tituloModal    = document.getElementById("modal_titulo");
      var generosModal   = document.getElementById("modal_generos");
      var recomModal     = document.getElementById("modal_recomendacao");
      var sinopseModal   = document.getElementById("modal_texto_sinopse");
      var overlayModal   = document.getElementById("modal_anime");

      // Preenche o modal com os dados do anime
      imgModal.src            = anime.imagem;
      tituloModal.innerHTML   = anime.titulo;
      generosModal.innerHTML  = anime.generos;
      recomModal.innerHTML    = anime.recomendacao;
      sinopseModal.innerHTML  = anime.sinopse;

      // Reseta coração para o padrão antes de verificar
      atualizarVisualCoracao(false);

      var idUsuario = parseInt(sessionStorage.ID_USUARIO);
      console.log("[Favorito] Abrindo modal — idUsuario:", idUsuario, "| idAnime:", idAnimeAtual);

      if (idUsuario && idAnimeAtual) {
        fetch("/favoritos/verificar/" + idUsuario + "/" + idAnimeAtual)
          .then(function (resposta) {
            console.log("[Favorito] Verificar status HTTP:", resposta.status);
            if (resposta.ok) {
              resposta.json().then(function (dados) {
                console.log("[Favorito] Já favoritado?", dados.favoritado);
                atualizarVisualCoracao(dados.favoritado);
              });
            } else {
              console.error("[Favorito] Erro ao verificar — status:", resposta.status);
            }
          })
          .catch(function (erro) {
            console.error("[Favorito] Erro de conexão ao verificar:", erro);
          });
      } else {
        console.warn("[Favorito] Sem sessão ou id de anime inválido. idUsuario:", idUsuario, "idAnime:", idAnimeAtual);
      }

      overlayModal.style.display = "flex";
    }

    function atualizarVisualCoracao(favoritado) {
      var icone = document.getElementById("icone_favorito");
      var texto = document.getElementById("texto_favorito");
      var btn   = document.getElementById("btn_favorito");

      if (favoritado) {
        btn.classList.add("btn-favoritar--ativo");
        texto.innerHTML = "Favoritado!";
      } else {
        btn.classList.remove("btn-favoritar--ativo");
        texto.innerHTML = "Favoritar";
      }
    }

    function toggleFavorito() {
      var idUsuario = parseInt(sessionStorage.ID_USUARIO);
      if (!idUsuario || isNaN(idUsuario)) {
        alert("Você precisa estar logado para favoritar!");
        return;
      }
      if (!idAnimeAtual || isNaN(idAnimeAtual)) {
        console.error("[Favorito] ID do anime inválido:", idAnimeAtual);
        return;
      }

      console.log("[Favorito] Enviando toggle — idUsuario:", idUsuario, "| idAnime:", idAnimeAtual);

      fetch("/favoritos/toggle", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          idUsuarioServer: idUsuario,
          idAnimeServer:   idAnimeAtual
        })
      })
      .then(function (resposta) {
        console.log("[Favorito] Toggle status HTTP:", resposta.status);
        if (resposta.ok) {
          resposta.json().then(function (dados) {
            console.log("[Favorito] Novo estado favoritado:", dados.favoritado);
            atualizarVisualCoracao(dados.favoritado);
          });
        } else {
          resposta.text().then(function (texto) {
            console.error("[Favorito] Erro ao alternar favorito:", texto);
            alert("Erro ao favoritar. Tente novamente.");
          });
        }
      })
      .catch(function (erro) {
        console.error("[Favorito] Erro de conexão:", erro);
        alert("Erro de conexão ao favoritar.");
      });
    }

    function fecharModal() {
      document.getElementById("modal_anime").style.display = "none";
    }

    // Fechar ao clicar fora do conteúdo
    window.onclick = function(event) {
      var modal = document.getElementById("modal_anime");
      if (event.target == modal) {
        modal.style.display = "none";
      }
    }

    // A função renderizarAnimes() é chamada pelo onload do body
  </script>
</body>

</html>
