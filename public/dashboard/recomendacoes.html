<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CaminhoNinja | Recomendações</title>

  <script src="../js/sessao.js"></script>

  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="icon" href="../assets/icon/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body onload="validarSessao()">

  <div class="dashboard-container">
    
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-logo" style="text-align: center; margin-bottom: 20px;">
        <a href="../index.html"><img src="../assets/icon/logo.png" alt="Caminho Ninja" style="max-width: 100%; height: auto; max-height: 80px; cursor: pointer; transition: opacity 0.3s;" /></a>
      </div>
      <div class="sidebar-user">
        Olá, <span id="b_usuario">Ninja</span>!
      </div>
      <hr class="sidebar-divider">
      <ul class="sidebar-menu">
        <li>
          <a href="dashboard.html">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            Dashboard
          </a>
        </li>
        <li>
          <a href="recomendacoes.html" class="active">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
            Recomendações
          </a>
        </li>
        <li>
          <a href="linha-vida.html">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
            Linha da Vida
          </a>
        </li>
      </ul>
      <div class="sidebar-bottom">
        <button class="botao-sair" onclick="limparSessao()">Sair da vila</button>
      </div>
    </nav>

    <!-- Conteúdo Principal -->
    <div class="conteudo-painel">

      <div class="secao-boas-vindas">
        <h2>Recomendações da Vila</h2>
        <p>Explore nossa seleção de 10 grandes animes que todo ninja deve assistir!</p>
      </div>

      <!-- Grid de Animes -->
      <div class="grid-animes" id="container_animes">
        <!-- Os animes serão injetados aqui via JavaScript -->
      </div> <!-- Fim grid-animes -->

    </div> <!-- Fim conteudo-painel -->
  </div> <!-- Fim dashboard-container -->



  <!-- Modal de Detalhes -->
  <div id="modal_anime" class="modal-overlay">
    <div class="modal-content">
      <span class="close-btn" onclick="fecharModal()">&times;</span>
      <div class="modal-body">
        <img id="modal_img" src="" alt="Capa do Anime">
        <div class="modal-info">
          <h2 id="modal_titulo">Título</h2>
          <p class="modal-genero"><strong>Gênero:</strong> <span id="modal_generos"></span></p>
          <p class="modal-recomendacao" id="modal_recomendacao"></p>
          <div class="modal-sinopse">
            <strong>Sinopse:</strong>
            <p id="modal_texto_sinopse"></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Dados dos Animes
    let listaAnimes = [];

    function renderizarAnimes() {
      const container = document.getElementById("container_animes");
      container.innerHTML = "Carregando recomendações da vila...";

      fetch("/animes/listar")
        .then(function (resposta) {
          if (resposta.ok) {
            resposta.json().then(function (animesBanco) {
              listaAnimes = animesBanco;
              container.innerHTML = "";
              listaAnimes.forEach((anime, index) => {
                container.innerHTML += `
                  <div class="card-anime" onclick="abrirModal(${index})">
                    <div class="capa-wrapper">
                      <img src="${anime.imagem}" alt="${anime.titulo}">
                    </div>
                    <h3>${anime.titulo}</h3>
                  </div>
                `;
              });
            });
          } else {
            console.error("Nenhum dado encontrado ou erro na API");
            container.innerHTML = "Falha ao carregar as recomendações.";
          }
        })
        .catch(function (error) {
          console.error(`Erro na obtenção dos animes: ${error.message}`);
          container.innerHTML = "Erro ao conectar com o servidor.";
        });
    }

    function abrirModal(index) {
      const anime = listaAnimes[index];
      document.getElementById("modal_img").src = anime.imagem;
      document.getElementById("modal_titulo").innerText = anime.titulo;
      document.getElementById("modal_generos").innerText = anime.generos;
      document.getElementById("modal_recomendacao").innerText = anime.recomendacao;
      document.getElementById("modal_texto_sinopse").innerText = anime.sinopse;

      document.getElementById("modal_anime").style.display = "flex";
    }

    function fecharModal() {
      document.getElementById("modal_anime").style.display = "none";
    }

    // Fechar ao clicar fora do conteúdo
    window.onclick = function(event) {
      const modal = document.getElementById("modal_anime");
      if (event.target == modal) {
        modal.style.display = "none";
      }
    }

    // Chama a renderização quando carrega o script
    renderizarAnimes();
  </script>
</body>

</html>
