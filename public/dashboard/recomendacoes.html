<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CaminhoNinja | Recomendações</title>

  <script src="../js/sessao.js"></script>

  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="icon" href="../assets/icon/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body onload="validarSessao()">

  <div class="painel-container">
    
    <!-- Sidebar -->
    <nav class="barra-lateral">
      <div class="barra-lateral-logo" style="text-align: center; margin-bottom: 20px;">
        <a href="../index.html"><img src="../assets/icon/logo.png" alt="Caminho Ninja" style="max-width: 100%; height: auto; max-height: 80px; cursor: pointer; transition: opacity 0.3s;" /></a>
      </div>
      <div class="barra-lateral-usuario">
        Olá, <span id="b_usuario">Ninja</span>!
      </div>
      <hr class="barra-lateral-divisor">
      <ul class="barra-lateral-menu">
        <li>
          <a href="dashboard.html">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            Dashboard
          </a>
        </li>
        <li>
          <a href="recomendacoes.html" class="ativo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
            Recomendações
          </a>
        </li>
        <li>
          <a href="linha-vida.html">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
            Linha da Vida
          </a>
        </li>
      </ul>
      <div class="barra-lateral-rodape">
        <button class="botao-sair" onclick="limparSessao()">Sair da vila</button>
      </div>
    </nav>

    <!-- Conteúdo Principal -->
    <div class="conteudo-painel">

      <div class="secao-boas-vindas">
        <h2>Recomendações da Vila</h2>
        <p>Explore nossa seleção de 10 grandes animes que todo ninja deve assistir!</p>
      </div>

      <!-- Grid de Animes -->
      <div class="grid-animes" id="container_animes">
        <!-- Os animes serão injetados aqui via JavaScript -->
      </div> <!-- Fim grid-animes -->

    </div> <!-- Fim conteudo-painel -->
  </div> <!-- Fim dashboard-container -->



  <!-- Modal de Detalhes -->
  <div id="modal_anime" class="modal-fundo">
    <div class="modal-conteudo">
      <span class="botao-fechar" onclick="fecharModal()">&times;</span>
      <div class="modal-corpo">
        <img id="modal_img" src="" alt="Capa do Anime">
        <div class="modal-informacoes">
          <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 10px; flex-wrap: wrap;">
            <h2 id="modal_titulo" style="margin: 0; font-size: 1.8rem; font-weight: 700;">Título</h2>
            <button id="btn_favorito" onclick="toggleFavorito()" class="botao-favoritar" style="background: transparent; border: none; cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: 'Poppins', sans-serif; font-size: 0.95rem; font-weight: 500; transition: all 0.3s ease; color: #94a3b8; outline: none; padding: 5px 8px; border-radius: 6px;">
              <svg id="coracao_svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transition: all 0.3s ease;"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
              <span id="texto_favorito">Favoritar</span>
            </button>
          </div>
          <p class="modal-genero"><strong>Gênero:</strong> <span id="modal_generos"></span></p>
          <p class="modal-recomendacao" id="modal_recomendacao"></p>
          <div class="modal-sinopse">
            <strong>Sinopse:</strong>
            <p id="modal_texto_sinopse"></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Dados dos Animes
    let listaAnimes = [];
    let idAnimeAtual = null;

    function renderizarAnimes() {
      var container = document.getElementById("container_animes");
      container.innerHTML = "Carregando recomendações da vila...";

      fetch("/animes/listar")
        .then(function (resposta) {
          if (resposta.ok) {
            resposta.json().then(function (animesBanco) {
              listaAnimes = animesBanco;
              container.innerHTML = "";
              listaAnimes.forEach(function (anime, index) {
                container.innerHTML += `
                  <div class="cartao-anime" onclick="abrirModal(${index})">
                    <div class="capa-envoltorio">
                      <img src="${anime.imagem}" alt="${anime.titulo}">
                    </div>
                    <h3>${anime.titulo}</h3>
                  </div>
                `;
              });
            });
          } else {
            console.error("Nenhum dado encontrado ou erro na API");
            container.innerHTML = "Falha ao carregar as recomendações.";
          }
        })
        .catch(function (error) {
          console.error("Erro na obtenção dos animes: " + error.message);
          container.innerHTML = "Erro ao conectar com o servidor.";
        });
    }

    function abrirModal(index) {
      var anime = listaAnimes[index];
      idAnimeAtual = anime.id;

      // Referencia todos os elementos do modal de uma vez
      var imgModal       = document.getElementById("modal_img");
      var tituloModal    = document.getElementById("modal_titulo");
      var generosModal   = document.getElementById("modal_generos");
      var recomModal     = document.getElementById("modal_recomendacao");
      var sinopseModal   = document.getElementById("modal_texto_sinopse");
      var overlayModal   = document.getElementById("modal_anime");

      // Preenche o modal com os dados do anime
      imgModal.src            = anime.imagem;
      tituloModal.innerHTML   = anime.titulo;
      generosModal.innerHTML  = anime.generos;
      recomModal.innerHTML    = anime.recomendacao;
      sinopseModal.innerHTML  = anime.sinopse;

      // Reseta coração para o padrão antes de verificar
      atualizarVisualCoracao(false);

      var idUsuario = sessionStorage.ID_USUARIO;
      if (idUsuario && idAnimeAtual) {
        fetch("/favoritos/verificar/" + idUsuario + "/" + idAnimeAtual)
          .then(function (resposta) {
            if (resposta.ok) {
              resposta.json().then(function (dados) {
                atualizarVisualCoracao(dados.favoritado);
              });
            }
          })
          .catch(function (erro) {
            console.error("Erro ao verificar favorito:", erro);
          });
      }

      overlayModal.style.display = "flex";
    }

    function atualizarVisualCoracao(favoritado) {
      var coracao = document.getElementById("coracao_svg");
      var texto   = document.getElementById("texto_favorito");
      var btn     = document.getElementById("btn_favorito");
      
      if (favoritado) {
        coracao.style.fill   = "#f43f5e";
        coracao.style.stroke = "#f43f5e";
        texto.innerHTML      = "Favoritado!";
        btn.style.color      = "#f43f5e";
      } else {
        coracao.style.fill   = "none";
        coracao.style.stroke = "#94a3b8";
        texto.innerHTML      = "Favoritar";
        btn.style.color      = "#94a3b8";
      }
    }

    function toggleFavorito() {
      var idUsuario = sessionStorage.ID_USUARIO;
      if (!idUsuario) {
        alert("Você precisa estar logado para favoritar!");
        return;
      }
      if (!idAnimeAtual) return;

      fetch("/favoritos/toggle", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          idUsuarioServer: idUsuario,
          idAnimeServer:   idAnimeAtual
        })
      })
      .then(function (resposta) {
        if (resposta.ok) {
          resposta.json().then(function (dados) {
            atualizarVisualCoracao(dados.favoritado);
          });
        } else {
          console.error("Erro ao alternar favorito");
        }
      })
      .catch(function (erro) {
        console.error("Erro ao conectar com servidor para favoritar:", erro);
      });
    }

    function fecharModal() {
      document.getElementById("modal_anime").style.display = "none";
    }

    // Fechar ao clicar fora do conteúdo
    window.onclick = function(event) {
      var modal = document.getElementById("modal_anime");
      if (event.target == modal) {
        modal.style.display = "none";
      }
    }

    // Chama a renderização quando carrega o script
    renderizarAnimes();
  </script>
</body>

</html>
