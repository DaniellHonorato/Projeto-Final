<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CaminhoNinja | Recomendações</title>

  <script src="../js/sessao.js"></script>

  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="icon" href="../assets/icon/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body onload="validarSessao(); renderizarAnimes()">

  <div class="dashboard-container">
    
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-logo" style="text-align: center; margin-bottom: 20px;">
        <a href="../index.html"><img src="../assets/icon/logo.png" alt="Caminho Ninja" style="max-width: 100%; height: auto; max-height: 80px; cursor: pointer; transition: opacity 0.3s;" /></a>
      </div>
      <div class="sidebar-user">
        Olá, <span id="b_usuario">Ninja</span>!
      </div>
      <hr class="sidebar-divider">
      <ul class="sidebar-menu">
        <li>
          <a href="dashboard.html">
            <img src="../assets/icon/bandana.png" width="20" height="20" alt="Ícone Dashboard">
            Dashboard
          </a>
        </li>
        <li>
          <a href="recomendacoes.html" class="active">
            <img src="../assets/icon/grimorio.png" width="20" height="20" alt="Ícone Recomendações">
            Recomendações
          </a>
        </li>
        <li>
          <a href="linha-vida.html">
            <img src="../assets/icon/haikyuu.png" width="20" height="20" alt="Ícone Linha da Vida">
            Linha da Vida
          </a>
        </li>
      </ul>
      <div class="sidebar-bottom">
        <button class="botao-sair" onclick="limparSessao()">Sair da vila</button>
      </div>
    </nav>

    <!-- Conteúdo Principal -->
    <div class="conteudo-painel">

      <div class="secao-boas-vindas">
        <h2>Recomendações da Vila</h2>
        <p>Explore nossa seleção de 10 grandes animes que todo ninja deve assistir!</p>
      </div>

      <!-- Barra de Filtros -->
      <div class="barra-filtros">
        <button id="btn_filtro_favoritos" class="btn-filtro" onclick="toggleFiltroFavoritos()">⭐ Meus Favoritos</button>
      </div>

      <!-- Grid de Animes -->
      <div class="grid-animes" id="container_animes">
        <!-- Os animes serão injetados aqui via JavaScript -->
      </div> <!-- Fim grid-animes -->

    </div> <!-- Fim conteudo-painel -->
  </div> <!-- Fim dashboard-container -->



  <!-- Modal de Detalhes -->
  <div id="modal_anime" class="modal-overlay">
    <div class="modal-content">
      <span class="close-btn" onclick="fecharModal()">&times;</span>
      <div class="modal-body">
        <img id="modal_img" src="" alt="Capa do Anime">
        <div class="modal-info">
          <div class="modal-titulo-linha">
            <h2 id="modal_titulo">Título</h2>
            <button id="btn_favorito" class="btn-favoritar" onclick="toggleFavorito()">
              <span id="icone_favorito">♥</span>
              <span id="texto_favorito">Favoritar</span>
            </button>
          </div>
          <p class="modal-genero"><strong>Gênero:</strong> <span id="modal_generos"></span></p>
          <p class="modal-recomendacao" id="modal_recomendacao"></p>
          <div class="modal-sinopse">
            <strong>Sinopse:</strong>
            <p id="modal_texto_sinopse"></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    var listaAnimes = [];
    var idAnimeAtual = 0;
    var favoritado = 0;
    var filtroAtivo = 0;

    // ── Carregar Animes ────────────────────────────────────────────
    function renderizarAnimes() {
      var container = document.getElementById("container_animes");
      container.innerHTML = "Carregando recomendações da vila...";

      fetch("/animes/listar")
        .then(function (resposta) {
          if (resposta.ok) {
            resposta.json().then(function (animesBanco) {
              listaAnimes = animesBanco;
              renderizarGrid(listaAnimes);
            });
          } else {
            container.innerHTML = "Falha ao carregar as recomendações.";
          }
        })
        .catch(function (erro) {
          container.innerHTML = "Erro ao conectar com o servidor.";
        });
    }

    // ── Renderizar Grid ────────────────────────────────────────────
    function renderizarGrid(lista) {
      var container = document.getElementById("container_animes");
      container.innerHTML = "";

      if (lista.length == 0) {
        container.innerHTML = '<div class="filtro-vazio"><span>⭐</span>Você ainda não tem favoritos. Favorite um anime e volte aqui!</div>';
        return;
      }

      for (var i = 0; i < lista.length; i++) {
        var indiceReal = listaAnimes.indexOf(lista[i]);
        container.innerHTML += `
          <div class="card-anime" onclick="abrirModal(${indiceReal})">
            <div class="capa-wrapper">
              <img src="${lista[i].imagem}" alt="${lista[i].titulo}">
            </div>
            <h3>${lista[i].titulo}</h3>
          </div>
        `;
      }
    }

    // ── Filtro de Favoritos ────────────────────────────────────────
    function toggleFiltroFavoritos() {
      var botao = document.getElementById("btn_filtro_favoritos");

      if (filtroAtivo == 0) {
        filtroAtivo = 1;
        botao.classList.add("ativo");
        botao.innerHTML = "⭐ Meus Favoritos (ativo)";
        buscarFavoritos();
      } else {
        filtroAtivo = 0;
        botao.classList.remove("ativo");
        botao.innerHTML = "⭐ Meus Favoritos";
        renderizarGrid(listaAnimes);
      }
    }

    function buscarFavoritos() {
      var idUsuario = sessionStorage.ID_USUARIO;
      var container = document.getElementById("container_animes");
      container.innerHTML = "Carregando seus favoritos...";

      fetch("/favoritos/listar/" + idUsuario)
        .then(function (resposta) {
          if (resposta.ok) {
            resposta.json().then(function (animeFavoritos) {
              aplicarFiltro(animeFavoritos);
            });
          } else {
            container.innerHTML = "Erro ao buscar favoritos.";
          }
        })
        .catch(function (erro) {
          container.innerHTML = "Erro ao conectar com o servidor.";
        });
    }

    function aplicarFiltro(animeFavoritos) {
      var listaFiltrada = [];

      for (var i = 0; i < listaAnimes.length; i++) {
        for (var j = 0; j < animeFavoritos.length; j++) {
          if (listaAnimes[i].id == animeFavoritos[j].id) {
            listaFiltrada[listaFiltrada.length] = listaAnimes[i];
          }
        }
      }

      renderizarGrid(listaFiltrada);
    }

    // ── Abrir Modal ────────────────────────────────────────────────
    function abrirModal(index) {
      var anime = listaAnimes[index];
      idAnimeAtual = anime.id;

      document.getElementById("modal_img").src = anime.imagem;
      document.getElementById("modal_titulo").innerHTML = anime.titulo;
      document.getElementById("modal_generos").innerHTML = anime.generos;
      document.getElementById("modal_recomendacao").innerHTML = anime.recomendacao;
      document.getElementById("modal_texto_sinopse").innerHTML = anime.sinopse;

      favoritado = 0;
      atualizarBotaoFavorito();

      var idUsuario = sessionStorage.ID_USUARIO;

      if (idUsuario != undefined && idAnimeAtual != undefined) {
        fetch("/favoritos/verificar/" + idUsuario + "/" + idAnimeAtual)
          .then(function (resposta) {
            if (resposta.ok) {
              resposta.json().then(function (dados) {
                if (dados.favoritado == true) {
                  favoritado = 1;
                } else {
                  favoritado = 0;
                }
                atualizarBotaoFavorito();
              });
            }
          });
      }

      document.getElementById("modal_anime").style.display = "flex";
    }

    // ── Botão Favoritar ────────────────────────────────────────────
    function atualizarBotaoFavorito() {
      var botao = document.getElementById("btn_favorito");
      var texto = document.getElementById("texto_favorito");

      if (favoritado == 1) {
        botao.style.borderColor = "#f43f5e";
        botao.style.color = "#f43f5e";
        botao.style.backgroundColor = "rgba(244, 63, 94, 0.08)";
        texto.innerHTML = "Favoritado!";
      } else {
        botao.style.borderColor = "#94a3b8";
        botao.style.color = "#94a3b8";
        botao.style.backgroundColor = "transparent";
        texto.innerHTML = "Favoritar";
      }
    }

    function toggleFavorito() {
      var idUsuario = sessionStorage.ID_USUARIO;

      if (idUsuario == undefined) {
        alert("Você precisa estar logado para favoritar!");
        return;
      }

      if (idAnimeAtual == undefined || idAnimeAtual == 0) {
        return;
      }

      fetch("/favoritos/toggle", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          idUsuarioServer: idUsuario,
          idAnimeServer: idAnimeAtual
        })
      })
        .then(function (resposta) {
          if (resposta.ok) {
            resposta.json().then(function (dados) {
              if (dados.favoritado == true) {
                favoritado = 1;
              } else {
                favoritado = 0;
              }
              atualizarBotaoFavorito();
            });
          } else {
            alert("Erro ao favoritar. Tente novamente.");
          }
        })
        .catch(function (erro) {
          alert("Erro de conexão ao favoritar.");
        });
    }

    // ── Fechar Modal ───────────────────────────────────────────────
    function fecharModal() {
      document.getElementById("modal_anime").style.display = "none";
    }

    window.onclick = function (event) {
      var modal = document.getElementById("modal_anime");
      if (event.target == modal) {
        modal.style.display = "none";
      }
    }
  </script>
</body>

</html>
