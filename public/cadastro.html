<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>CaminhoNinja | Cadastro</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="css/auth.css" />
  <link rel="icon" href="./assets/icon/logo.png" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<body onload="gerarCaptcha()">
  <header>
    <div class="logo">
      <a href="index.html"><img src="./assets/icon/logo.png" alt="Caminho Ninja" style="height: 55px; width: auto;" /></a>
    </div>
    <nav>
      <ul id="nav-list">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#vida">Valores</a></li>
        <li><a href="index.html">Protagonistas</a></li>
        <li class="auth-link"><a href="login.html">Login</a></li>
        <li class="auth-link"><a href="cadastro.html">Cadastro</a></li>
      </ul>
    </nav>
  </header>

  <div class="alerta_erro">
    <div class="card_erro" id="cardErro">
      <span id="mensagem_erro"></span>
    </div>
  </div>

  <!-- Página de Cadastro -->
  <div class="pagina-cadastro">

    <!-- Coluna Esquerda — Imagem dos Protagonistas -->
    <div class="coluna-esquerda">
      <img
        class="imagem-protagonistas"
        src="./assets/imgs/img-cad.png"
        alt="Naruto, Hinata e Asta"
      />
    </div>

    <!-- Coluna Direita — Formulário -->
    <div class="coluna-direita">

      <div class="cadastro-titulo">
        <h2>Inicie sua jornada!</h2>
        <p>Crie sua conta e entre para a vila</p>
      </div>

      <!-- Formulário em Grade (3 linhas com 2 colunas) -->
      <div class="formulario-grade">

        <!-- Linha 1: Nome e E-mail -->
        <div class="linha-formulario">
          <div class="campo">
            <span>Nome</span>
            <input id="nome_input" type="text" placeholder="Seu nome" />
          </div>
          <div class="campo">
            <span>E-mail</span>
            <input id="email_input" type="text" placeholder="meuemail@provedor.com" />
          </div>
        </div>

        <!-- Linha 2: Senha e Confirmação de Senha -->
        <div class="linha-formulario">
          <div class="campo">
            <span>Senha</span>
            <input id="senha_input" type="password" placeholder="••••••" />
          </div>
          <div class="campo">
            <span>Confirmação de Senha</span>
            <input id="confirmacao_senha_input" type="password" placeholder="••••••" />
          </div>
        </div>

        <!-- Linha 3: Já assistiu anime e CAPTCHA -->
        <div class="linha-formulario">
          <div class="campo">
            <span>Você já assistiu algum anime antes?</span>
            <select id="ipt_anime">
              <option value="">— Selecione —</option>
              <option value="1">Sim</option>
              <option value="0">Não</option>
            </select>
          </div>
          <div class="campo">
            <span id="captcha_pergunta">Carregando verificação...</span>
            <input id="captcha_input" type="number" placeholder="Digite o resultado" />
          </div>
        </div>

      </div>

      <button class="botao" onclick="cadastrar()">Cadastrar</button>

      <p class="link-login">
        Já tem conta?
        <a href="login.html">Faça login</a>
      </p>

      <div id="div_aguardar" class="loading-div">
        <img src="./assets/icon/loading.png" id="loading-gif" />
      </div>

      <div id="div_erros_login"></div>

    </div>

  </div>

</body>

</html>

<script>
  var captchaRespostaDecimal = 0;

  //  Gerar CAPTCHA
  function gerarCaptcha() {
    var a = Math.floor(Math.random() * 10) + 1;
    var b = Math.floor(Math.random() * 10) + 1;
    captchaRespostaDecimal = a * b;

    document.getElementById("captcha_pergunta").innerHTML =
      `Verificação: quanto é ${a} x ${b}?`;
  }

  //  Validar CAPTCHA
  function validarCaptcha() {
    var inputCaptcha    = document.getElementById("captcha_input");
    var respostaUsuario = Number(inputCaptcha.value);

    var respostaUsuarioBinario = respostaUsuario.toString(2);
    var gabaritoBinario        = captchaRespostaDecimal.toString(2);

    console.log("Usuário digitou (decimal):", respostaUsuario);
    console.log("Convertido para binário:", respostaUsuarioBinario);
    console.log("Gabarito em binário:", gabaritoBinario);

    return respostaUsuarioBinario === gabaritoBinario;
  }

  //  Cadastrar
  function cadastrar() {
    var inputNome      = document.getElementById("nome_input");
    var inputEmail     = document.getElementById("email_input");
    var inputSenha     = document.getElementById("senha_input");
    var inputConfSenha = document.getElementById("confirmacao_senha_input");
    var inputAnime     = document.getElementById("ipt_anime");
    var inputCaptcha   = document.getElementById("captcha_input");

    var nomeVar             = inputNome.value.trim();
    var emailVar            = inputEmail.value.trim();
    var senhaVar            = inputSenha.value;
    var confirmacaoSenhaVar = inputConfSenha.value;
    var jaViuAnimeVar       = inputAnime.value;

    if (!nomeVar || !emailVar || !senhaVar || !confirmacaoSenhaVar || !jaViuAnimeVar) {
      exibirErro("Por favor, preencha todos os campos antes de continuar.");
      return false;
    }
/*
    // Validação simples de senha
    if (senhaVar != confirmacaoSenhaVar) {
      exibirErro("As senhas não coincidem. Verifique e tente novamente.");
      return false;
    }
*/
    
    // Verificação de senha completa
    var senhaSemEspaco = senhaVar.trim();
    var caracteresEspeciais = ['@', '#', '$', '%', '&', '*', '!', '?'];
    var temEspecial = false;

    for (var i = 0; i < caracteresEspeciais.length; i++) {
        if (senhaSemEspaco.indexOf(caracteresEspeciais[i]) != -1) {
            temEspecial = true;
            break;
        }
    }

    if (senhaSemEspaco.length < 8 || temEspecial == false) {
        exibirErro("A senha deve ter pelo menos 8 caracteres e conter pelo menos um caractere especial.");
        return false;
    }
    

    if (!validarCaptcha()) {
      exibirErro("Resposta incorreta. Tente novamente.");
      gerarCaptcha();
      inputCaptcha.value = "";
      return false;
    }

    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        nomeServer:       nomeVar,
        emailServer:      emailVar,
        senhaServer:      senhaVar,
        jaViuAnimeServer: jaViuAnimeVar
      }),
    })
      .then(function (resposta) {
        if (resposta.ok) {
          exibirErro("Vai Palmeiras! Redirecionando para o Login...", "sucesso");
          setTimeout(function () { window.location = "login.html"; }, 2000);
          limparFormulario(inputNome, inputEmail, inputSenha, inputConfSenha, inputAnime, inputCaptcha);
        } else {
          return resposta.text().then(function (texto) {
            console.error(texto);
            throw texto.replace(/\"/g, '');
          });
        }
      })
      .catch(function (erro) {
        console.log("#ERRO: " + erro);
        exibirErro(typeof erro === 'string' ? erro : "Erro ao cadastrar. Tente novamente.");
      });

    return false;
  }

  // ── Helpers────────
  function exibirErro(mensagem, tipo) {
    var cardErro     = document.getElementById("cardErro");
    var mensagemErro = document.getElementById("mensagem_erro");

    if (tipo === "sucesso") {
      cardErro.classList.remove("card_erro");
      cardErro.classList.add("card_sucesso");
    } else {
      cardErro.classList.remove("card_sucesso");
      cardErro.classList.add("card_erro");
    }

    cardErro.style.display = "block";
    mensagemErro.innerHTML = mensagem;
    setTimeout(function () { cardErro.style.display = "none"; }, 5000);
  }

  function limparFormulario(inputNome, inputEmail, inputSenha, inputConfSenha, inputAnime, inputCaptcha) {
    inputNome.value      = "";
    inputEmail.value     = "";
    inputSenha.value     = "";
    inputConfSenha.value = "";
    inputAnime.value     = "";
    inputCaptcha.value   = "";
  }
</script>
